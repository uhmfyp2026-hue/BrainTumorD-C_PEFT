<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Classify Scan — NeuroScan AI</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05090f;--bg2:#0d1523;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --accent:#2a72d8;--accent2:#1d5db8;--glow:rgba(42,114,216,0.22);
  --text:#e8edf5;--muted:#7a8fa8;--dim:#3a4d63;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--purple:#8b5cf6;
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;
}
html{scroll-behavior:smooth}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.7;min-height:100vh}
a{text-decoration:none;color:inherit}

/* NAV */
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 2rem;background:rgba(5,9,15,0.9);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700;color:var(--text)}
.logo strong{color:var(--accent)}
.logo-icon{width:34px;height:34px;min-width:34px;background:linear-gradient(135deg,#1a3a6e,#2a72d8);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:16px;height:16px;display:block;fill:none;stroke:#fff;stroke-width:2}
.nav-back{font-size:14px;color:var(--muted);padding:7px 13px;border-radius:var(--r8);border:1px solid var(--border2);transition:all .2s}
.nav-back:hover{color:var(--text);background:rgba(255,255,255,.05)}

/* MAIN */
.main{max-width:820px;margin:0 auto;padding:3.5rem 2rem 5rem}
.main h1{font-size:30px;font-weight:800;margin-bottom:8px;letter-spacing:-.01em}
.subtitle{color:var(--muted);font-size:15px;margin-bottom:2.5rem}

/* UPLOAD ZONE */
.upload-zone{border:2px dashed rgba(42,114,216,.3);border-radius:var(--r20);padding:3.5rem 2rem;text-align:center;cursor:pointer;transition:all .2s;background:rgba(42,114,216,.04)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(42,114,216,.08)}
.up-icon{width:56px;height:56px;background:rgba(42,114,216,.15);border-radius:var(--r12);display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;color:var(--accent)}
.up-icon svg{width:26px;height:26px;display:block;fill:none;stroke:currentColor;stroke-width:1.8}
.upload-zone h3{font-size:17px;font-weight:700;margin-bottom:7px}
.upload-zone p{font-size:14px;color:var(--muted);margin-bottom:1.4rem}
.btn-browse{font-size:14px;font-weight:600;color:var(--accent);background:rgba(42,114,216,.12);border:1px solid rgba(42,114,216,.3);padding:9px 22px;border-radius:var(--r8);cursor:pointer;transition:all .2s;font-family:inherit}
.btn-browse:hover{background:rgba(42,114,216,.2)}
#fileInput{display:none}

/* PREVIEW */
.preview{display:none;margin-top:2rem}
.preview.show{display:block}
.p-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-bottom:1.5rem}
.p-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r16);overflow:hidden}
.p-box img{width:100%;height:220px;object-fit:cover;display:block}
.p-lbl{padding:9px 14px;font-size:12px;color:var(--muted);border-top:1px solid var(--border)}
.res-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r16);padding:1.6rem}
.res-box h3{font-size:17px;font-weight:700;margin-bottom:1.2rem}
.c-bars{display:flex;flex-direction:column;gap:14px}
.c-bar{display:flex;flex-direction:column;gap:5px}
.c-info{display:flex;justify-content:space-between;font-size:13px}
.c-name{color:var(--muted)}.c-pct{font-weight:700;color:var(--text)}
.c-track{height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden}
.c-fill{height:100%;border-radius:4px;width:0;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
.diag{margin-top:1.4rem;padding:1rem 1.2rem;border-radius:var(--r12);display:none;align-items:center;gap:12px}
.diag.danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25)}
.diag.safe{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25)}
.diag-ico{font-size:22px;flex-shrink:0}
.diag-txt strong{display:block;font-weight:700;font-size:15px;margin-bottom:2px}
.diag-txt span{font-size:13px;color:var(--muted)}

/* CLASSIFY BUTTON */
.btn-run{width:100%;padding:14px;font-size:16px;font-weight:800;font-family:inherit;color:#fff;background:var(--accent);border:none;border-radius:var(--r12);cursor:pointer;transition:all .2s;box-shadow:0 4px 24px var(--glow);display:flex;align-items:center;justify-content:center;gap:10px;margin-top:1.5rem;letter-spacing:.01em}
.btn-run:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 32px var(--glow)}
.btn-run:active{transform:scale(.98)}
.btn-run:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-run svg{width:20px;height:20px;display:block;fill:none;stroke:#fff;stroke-width:2;flex-shrink:0}
.spinner{width:18px;height:18px;min-width:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.spinner.on{display:block}

/* PLACEHOLDER MSG */
.placeholder-msg{font-size:14px;color:var(--muted);padding:1rem 0}

/* TOAST */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:#1a2e4a;border:1px solid var(--accent);color:var(--text);font-size:14px;padding:11px 22px;border-radius:var(--r12);z-index:9999;transition:transform .3s,opacity .3s;opacity:0;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:640px){
  .p-grid{grid-template-columns:1fr}
  .main{padding:2.5rem 1.25rem 4rem}
}
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 9c0-1.66 1.34-3 3-3s3 1.34 3 3c0 2-3 5-3 5s-3-3-3-5z"/><circle cx="12" cy="18" r="1" fill="#fff" stroke="none"/></svg>
    </div>
    <span>NeuroScan <strong>AI</strong></span>
  </a>
  <a href="index.html" class="nav-back">← Back to Home</a>
</nav>

<main class="main">
  <h1>Classify a Brain MRI Scan</h1>
  <p class="subtitle">Upload a T1-weighted MRI image to run tumor detection and classification.</p>

  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <div class="up-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <h3>Drop your MRI scan here</h3>
    <p>Supports JPEG, PNG · Max 10MB</p>
    <button class="btn-browse" onclick="event.stopPropagation();document.getElementById('fileInput').click()">Browse files</button>
    <input type="file" id="fileInput" accept="image/*"/>
  </div>

  <div class="preview" id="preview">
    <div class="p-grid">
      <div class="p-box">
        <img id="previewImg" src="" alt="Uploaded MRI"/>
        <div class="p-lbl">Uploaded scan</div>
      </div>
      <div class="res-box">
        <h3>Classification results</h3>
        <div class="c-bars" id="cBars">
          <p class="placeholder-msg">Ready — click "Run Classification" below.</p>
        </div>
        <div class="diag" id="diag"></div>
      </div>
    </div>
    <button class="btn-run" id="runBtn" onclick="runClassify()">
      <svg viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 0-2-2V9m0 0h18"/></svg>
      <span id="runLabel">Run Classification</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const CLASSES=[
  {name:'Glioma',color:'#ef4444'},
  {name:'Meningioma',color:'#f59e0b'},
  {name:'Pituitary',color:'#8b5cf6'},
  {name:'No Tumor',color:'#22c55e'},

// Drag and drop

zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag')});
zone.addEventListener('dragleave',()=>zone.classList.remove('drag'));
zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)loadFile(f)});
document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0])});

function loadFile(f){
  if(!f.type.startsWith('image/')){showToast('Please upload an image file.');return;}
  if(f.size>10*1024*1024){showToast('File too large (max 10MB).');return;}
  const r=new FileReader();
  r.onload=e=>{
    document.getElementById('previewImg').src=e.target.result;
    document.getElementById('preview').classList.add('show');
    document.getElementById('cBars').innerHTML='<p class="placeholder-msg">Ready — click "Run Classification" below.</p>';
    const d=document.getElementById('diag');d.style.display='none';d.className='diag';
  };
  r.readAsDataURL(f);
}

function showResults(scores,prediction,confidence){
  const bars=document.getElementById('cBars');
  bars.innerHTML='';
  CLASSES.forEach((c,i)=>{
    const d=document.createElement('div');d.className='c-bar';
    d.innerHTML=`<div class="c-info"><span class="c-name">${c.name}</span><span class="c-pct">${scores[i]}%</span></div><div class="c-track"><div class="c-fill" style="background:${c.color}" data-w="${scores[i]}"></div></div>`;
    bars.appendChild(d);
  });
  requestAnimationFrame(()=>setTimeout(()=>{
    document.querySelectorAll('.c-fill').forEach(f=>f.style.width=f.dataset.w+'%');
  },30));

  const diag=document.getElementById('diag');
  const isDetected=prediction!=='No Tumor';
  diag.className='diag '+(isDetected?'danger':'safe');
  diag.style.display='flex';
  diag.innerHTML=`<div class="diag-ico">${isDetected?'⚠️':'✅'}</div><div class="diag-txt"><strong>${isDetected?prediction+' detected':'No tumor detected'}</strong><span>${confidence}% confidence · ${isDetected?'Further clinical evaluation recommended.':'Scan appears normal.'}</span></div>`;
  showToast('Classification complete.');
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
